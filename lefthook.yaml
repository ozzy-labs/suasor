extends:
  - lefthook-base.yaml

# Repo-specific hooks (TS/Bun). The base config covers shell / markdown / yaml /
# toml / secrets; Biome (lint + format) is added here per NFR-QLT-1.
pre-commit:
  commands:
    biome:
      glob: "**/*.{ts,tsx,js,jsx,json,jsonc}"
      run: mise exec -- biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    # GitHub Actions workflow lint (actionlint is pinned in .mise.toml but was
    # otherwise never invoked). The base config lints YAML generically; this
    # adds Actions-specific checks (expressions, shell, deprecated runners).
    actionlint:
      glob: ".github/workflows/*.{yaml,yml}"
      run: mise exec -- actionlint {staged_files}

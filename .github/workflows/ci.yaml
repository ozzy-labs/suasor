name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      # Coverage gate (#258). `coverage-gate.mjs` runs `bun test --coverage` and
      # enforces an overall line/function floor parsed from the text reporter
      # (Bun 1.2.23's native coverageThreshold can't express an overall floor for
      # this repo — see bunfig.toml / scripts/coverage-gate.mjs). A failing test
      # still fails the step via bun's own exit code; CI is the source of truth so
      # a PR that bypasses local hooks is gated here. Floors ratchet up in #260.
      - name: Test (coverage gate)
        run: bun run test:coverage

      # Validate the distribution bundle (and its --external list) on every push,
      # not only at release time — a broken build otherwise lands on main unseen.
      - name: Build
        run: bun run build

  lint:
    name: lint (biome + markdown)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.23

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome
        run: bun run lint

      - name: Markdownlint
        run: bun run lint:md

  # Security & workflow quality gates. These mirror the local lefthook hooks
  # (gitleaks / trivy live in lefthook-base.yaml, actionlint in lefthook.yaml)
  # but CI is the source of truth: a PR that bypasses local hooks (e.g.
  # --no-verify, or a web edit) is still guarded here (#234). Tool versions are
  # pinned in .mise.toml and installed via mise-action to stay in lockstep.
  security:
    name: security (gitleaks + trivy + actionlint)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # gitleaks scans git history, so it needs full history rather than the
          # default shallow (depth 1) checkout.
          fetch-depth: 0

      - name: Install pinned tools (mise)
        uses: jdx/mise-action@v4
        with:
          # Only the tools this job needs; avoids installing the full toolchain.
          install_args: gitleaks trivy actionlint

      - name: Gitleaks (secret scan, full history)
        run: gitleaks git --no-banner --redact --exit-code 1

      - name: Trivy (vuln + secret scan)
        run: trivy fs --scanners vuln,secret --exit-code 1 --no-progress .

      - name: Actionlint (workflow lint)
        run: actionlint

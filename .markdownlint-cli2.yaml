config:
  MD013: false
  MD033:
    allowed_elements:
      - details
      - summary
      - description
  MD041: false
  MD060: false

ignores:
  - "**/node_modules"
  - "**/.claude/plans"
  # Machine-generated by release-please; its format (double blank lines) does not
  # follow our MD rules and must not be hand-edited.
  - "**/CHANGELOG.md"
  # Skill host dirs (ADR-0035): vendored ecosystem dev skills (externally managed
  # SSOT = @ozzylabs/skills) and local assistant-skill installs (SSOT = docs/skills/).
  # Neither is hand-edited here, so they are not linted. docs/skills/ IS linted.
  - "**/.claude/skills"
  - "**/.agents/skills"
  - "**/.claude/agents"
